<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    <divc class="container">
        <div class="row">
            <div class="col-lg-6">
                 <div>
                    <form method="post" action="{{ url_for('create') }}">
                        id: <input type="number" class="form-control" name="id">
                        firstname: <input type="text" class="form-control" name="firstname">
                        lastname: <input type="text" class="form-control" name="lastname">
                        state: <input type="text" class="form-control" name="state">
                        <input type="submit" value="Submit">
                    </form>
                </div>
            </div>
            <div class="col-lg-6">
                <div>
                    <table class="table table-hover">
                        <tr>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>State</th>
                        </tr>
                        {% for item in data %}
                        <tr>
                            <td>{{ item.id }}</td>
                            <td>{{ item.firstname }}</td>
                            <td>{{ item.lastname }}</td>
                            <td>{{ item.state }}</td>
                        </tr>
                        {% endfor %}

                    </table>
                    
                </div>

            </div>
        </div>
    </div>



   
</body>
</html>
